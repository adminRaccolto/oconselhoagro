<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <!-- Raccolto star / snowflake icon -->
  <g transform="translate(16, 24)">
    <!-- 6 petals -->
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" fill="#C9A227" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" fill="#C9A227" transform="rotate(60)"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" fill="#C9A227" transform="rotate(120)"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" fill="#C9A227" transform="rotate(180)"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" fill="#C9A227" transform="rotate(240)"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" fill="#C9A227" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="3" fill="#C9A227"/>
  </g>
  <!-- Raccolto wordmark -->
  <text
    x="34"
    y="31"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="700"
    font-style="italic"
    letter-spacing="0.5"
    fill="#C9A227"
  >Raccolto</text>
  <!-- ® symbol -->
  <text
    x="162"
    y="20"
    font-family="Georgia, serif"
    font-size="9"
    fill="#C9A227"
    opacity="0.85"
  >®</text>
</svg>
